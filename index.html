<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crowd Level Monitor</title>
    <style>
        /* 1. Global Styles & Variables */
        :root {
            --color-low: #28a745;
            --color-medium: #ffc107;
            --color-high: #dc3545;
            --color-neutral: #6c757d;
            --color-bg: #f8f9fa;
            --color-card-bg: #ffffff;
            --color-text-primary: #212529;
            --color-text-secondary: #495057;
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --border-radius: 10px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--color-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: background-color 0.4s ease;
        }

        /* 2. Main Card Structure */
        .monitor-card {
            min-width: 320px;
            background-color: var(--color-card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--card-shadow);
            padding: 24px 32px;
            text-align: center;
            border-top: 5px solid var(--color-neutral);
            transition: border-top-color 0.4s ease;
        }

        /* 3. Card Header */
        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .header h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--color-text-primary);
            margin: 0;
        }

        #status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--color-neutral);
            transition: background-color 0.4s ease;
        }

        /* 4. Main Level Display */
        .level-display h1 {
            font-size: 4.5rem;
            font-weight: 700;
            margin: 1rem 0;
            color: var(--color-neutral);
            transition: color 0.4s ease;
        }

        /* 5. RSSI Display (Secondary Info) */
        .rssi-display {
            color: var(--color-text-secondary);
            font-size: 1rem;
            margin-top: 1.5rem;
            border-top: 1px solid #eee;
            padding-top: 1rem;
        }

        .rssi-display strong {
            font-weight: 700;
            color: var(--color-text-primary);
        }

        /* 6. Dynamic Classes (Updated by JavaScript) */

        /* --- LOW --- */
        body.level-low .monitor-card {
            border-top-color: var(--color-low);
        }

        body.level-low #status-dot {
            background-color: var(--color-low);
        }

        body.level-low .level-display h1 {
            color: var(--color-low);
        }

        /* --- MEDIUM --- */
        body.level-medium .monitor-card {
            border-top-color: var(--color-medium);
        }

        body.level-medium #status-dot {
            background-color: var(--color-medium);
        }

        body.level-medium .level-display h1 {
            color: var(--color-medium);
        }

        /* --- HIGH --- */
        body.level-high .monitor-card {
            border-top-color: var(--color-high);
        }

        body.level-high #status-dot {
            background-color: var(--color-high);
        }

        body.level-high .level-display h1 {
            color: var(--color-high);
        }

        /* 7. Typography Enhancements */
        .monitor-card p {
            font-size: 0.95rem;
            color: var(--color-text-secondary);
            line-height: 1.5;
            margin-top: 5px;
        }

        /* 8. Pulsing Animation for High Alert */

        /* Define the pulsing effect */
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.4);
            }

            /* Start: faint glow */
            70% {
                box-shadow: 0 0 0 20px rgba(220, 53, 69, 0);
            }

            /* Peak: wider, fading glow */
            100% {
                box-shadow: 0 0 0 0 rgba(220, 53, 69, 0);
            }

            /* End: no glow */
        }

        /* Apply the pulse animation specifically when the body is in the 'level-high' state */
        body.level-high .monitor-card {
            /* Retain existing styles (border-top-color) */
            animation: pulse 2s infinite;
            /* 2-second duration, loops forever */
        }

        /* Make the status dot also pulse for extreme clarity */
        body.level-high #status-dot {
            /* Retain existing styles (background-color) */
            animation: pulse-dot 1s infinite alternate;
        }

        @keyframes pulse-dot {
            from {
                opacity: 1;
                transform: scale(1);
            }

            to {
                opacity: 0.7;
                transform: scale(1.3);
            }
        }

        /* 9. Focus Styles (For better visibility during testing/presentation) */
        .rssi-display strong {
            font-family: monospace, Courier, 'Consolas';
            /* Use monospaced font for data */
            font-size: 1.1rem;
        }

        .monitor-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.12);
        }
    </style>
</head>

<body>

    <main class="container">
        <div class="monitor-card">
            <div class="header">
                <span id="status-dot"></span>
                <h2>Live Crowd Level</h2>
            </div>
            <div class="level-display">
                <h1 id="crowd-level">--</h1>
            </div>

            <div class="rssi-display">
                <p>Current Signal: <strong id="rssi-value">--</strong> dBm</p>
            </div>
        </div>
    </main>

    <script>
        const levelElement = document.getElementById('crowd-level');
        const rssiElement = document.getElementById('rssi-value');
        const bodyElement = document.body;

        async function fetchLevel() {
            try {
               const response = await fetch('level.txt?t=' + Date.now()); // Date.now() bypasses the cache

                if (!response.ok) throw new Error('File not found');

                const data = await response.json();

                // 1. Update the Signal Strength instantly
                if (data.rssi) {
                    rssiElement.textContent = data.rssi;
                }

                // 2. Update the Crowd Level Text
                const level = data.level.toLowerCase();
                levelElement.textContent = level.toUpperCase();

                // 3. Update the Background Color
                bodyElement.classList.remove('level-low', 'level-medium', 'level-high');

                // Handle the initial "WAITING..." state
                const cleanLevel = level.replace("...", "");
                if (cleanLevel !== "waiting") {
                    bodyElement.classList.add('level-' + cleanLevel);
                }

            } catch (error) {
                console.error('Fetch Error:', error);
            }
        }

        // Set to 500ms (0.5 seconds) so it matches the speed of your terminal
        setInterval(fetchLevel, 500);
        fetchLevel();
    </script>

</body>

</html>
